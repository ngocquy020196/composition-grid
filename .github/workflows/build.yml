name: Build & Release Extension

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Build Chrome/Edge ──
      - name: Build Chrome/Edge
        run: npm run build

      - name: Upload Chrome artifact
        uses: actions/upload-artifact@v4
        with:
          name: composition-grid-chrome
          path: dist/
          retention-days: 30

      # ── Build Firefox ──
      - name: Build Firefox
        run: node scripts/build-firefox.js

      - name: Upload Firefox artifact
        uses: actions/upload-artifact@v4
        with:
          name: composition-grid-firefox
          path: dist-firefox/
          retention-days: 30

      # ── Release (on tag push only) ──
      - name: Package Chrome zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: cd dist && zip -r ../composition-grid-${{ github.ref_name }}.zip .

      - name: Package Firefox zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: cd dist-firefox && zip -r ../composition-grid-firefox-${{ github.ref_name }}.zip .

      - name: Extract changelog for this version
        if: startsWith(github.ref, 'refs/tags/v')
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          # Extract content between this version header and the next --- separator
          BODY=$(sed -n "/^## ${VERSION}/,/^---$/p" CHANGELOG.md | sed '1d;$d')
          # Write to file for multi-line support
          echo "$BODY" > release-notes.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            composition-grid-${{ github.ref_name }}.zip
            composition-grid-firefox-${{ github.ref_name }}.zip
