name: Build & Release Extension

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build popup
        run: npm run build:popup

      - name: Build content script
        run: npm run build:content

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: composition-grid-extension
          path: dist/
          retention-days: 30

      - name: Package extension as zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: cd dist && zip -r ../composition-grid-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Composition Grid ${{ github.ref_name }}
          generate_release_notes: true
          files: composition-grid-${{ github.ref_name }}.zip
